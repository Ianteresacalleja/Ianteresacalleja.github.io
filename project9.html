	<main class="project-page container">
		<section class="project-gallery" aria-label="Bookmaking gallery">
			<div class="project-main-frame">
				<img class="project-main-image" src="images/bookmaking/flag book 1.jpg" alt="Project 9 main image">
			</div>
			<div class="project-gallery-right">
				<h1 class="project-page-title">Bookmaking</h1><p class="project-page-description">Experimental photographic and typographic exploration, in book form.</p>
				<div class="project-thumbs" role="list">
					<button type="button" class="project-thumb is-active" data-full="images/bookmaking/flag book 1.jpg"><img src="images/bookmaking/flag book 1.jpg" alt="Project 9 thumbnail 1" loading="eager"></button>
					<button type="button" class="project-thumb" data-full="images/bookmaking/flag book 2.jpg"><img data-src="images/bookmaking/flag book 2.jpg" alt="Project 9 thumbnail 2" class="lazy-img" loading="lazy"></button>
					<button type="button" class="project-thumb" data-full="images/bookmaking/photo book 1.JPG"><img data-src="images/bookmaking/photo book 1.JPG" alt="Project 9 thumbnail 3" class="lazy-img" loading="lazy"></button>

					<button type="button" class="project-thumb" data-full="images/bookmaking/photo book 3.JPG"><img data-src="images/bookmaking/photo book 3.JPG" alt="Project 9 thumbnail 5" class="lazy-img" loading="lazy"></button>
					<button type="button" class="project-thumb" data-full="images/bookmaking/popupbook.JPG"><img data-src="images/bookmaking/popupbook.JPG" alt="Project 9 thumbnail 6" class="lazy-img" loading="lazy"></button>

					<button type="button" class="project-thumb" data-full="images/bookmaking/sketchbook2.JPG"><img data-src="images/bookmaking/sketchbook2.JPG" alt="Project 9 thumbnail 8" class="lazy-img" loading="lazy"></button>
					<button type="button" class="project-thumb" data-full="images/bookmaking/sketchbook3.JPG"><img data-src="images/bookmaking/sketchbook3.JPG" alt="Project 9 thumbnail 9" class="lazy-img" loading="lazy"></button>
					<button type="button" class="project-thumb" data-full="images/bookmaking/spin .JPG"><img data-src="images/bookmaking/spin .JPG" alt="Project 9 thumbnail 10" class="lazy-img" loading="lazy"></button>
					<button type="button" class="project-thumb" data-full="images/bookmaking/everything.jpg"><img data-src="images/bookmaking/everything.jpg" alt="Project 9 thumbnail 11" class="lazy-img" loading="lazy"></button>
					<button type="button" class="project-thumb" data-full="images/bookmaking/ac1.jpg"><img data-src="images/bookmaking/ac1.jpg" alt="Project 9 thumbnail 12" class="lazy-img" loading="lazy"></button>
					<button type="button" class="project-thumb" data-full="images/bookmaking/ac2.jpg"><img data-src="images/bookmaking/ac2.jpg" alt="Project 9 thumbnail 13" class="lazy-img" loading="lazy"></button>

	</main>

	<div id="contact-modal" class="contact-modal">
		<div class="contact-modal-content">
			<h2>Get In Touch<span class="contact-modal-close">&times;</span></h2>
			<form id="contact-form" action="https://formspree.io/f/mgonovqe" method="POST">
				<div class="form-group">
					<label for="name">Name</label>
					<input type="text" id="name" name="name" required>
				</div>
				<div class="form-group">
					<label for="email">Email</label>
					<input type="email" id="email" name="email" required>
				</div>
				<div class="form-group">
					<label for="message">Message</label>
					<textarea id="message" name="message" rows="5" required></textarea>
				</div>
				<button type="submit" class="submit-btn">Send</button>
			</form>
		</div>
	</div>

	<script src="js/main.js"></script>
